server.port=8080

anthropic.api-key=${ANTHROPIC_API_KEY:}
anthropic.base-url=https://api.anthropic.com
anthropic.version=2023-06-01
# Snapshot 20241022 removed for many keys; override in application-local.properties if needed
anthropic.model=claude-sonnet-4-20250514
anthropic.max-tokens=8192
anthropic.max-tool-rounds=24

# Neo4j：连接信息在 Neo4jHardcodedCredentials.java（不再使用 neo4j.* 或 NEO4J_* 环境变量）
# 启动时自动创建约束并写入 SRE 演示图（INC-042 等）；生产可改为 false 并用手动 POST /api/neo4j/bootstrap-sre
neo4j.sre.auto-seed=true

# Load last so application-local.properties can override keys above (e.g. anthropic.api-key).
# Optional: ./application-local.properties (cwd) or classpath application-local.properties.
spring.config.import=optional:file:./application-local.properties,optional:classpath:application-local.properties
